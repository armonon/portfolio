<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#052e1a"/><stop offset="1" stop-color="#04140d"/></linearGradient>
    <style>
      @keyframes ring { 0% { r:10; opacity:.9 } 100% { r:120; opacity:0 } }
      @keyframes rise { 0% { opacity:0; transform: translateY(18px) } 100% { opacity:1; transform: translateY(0) } }
      @keyframes sway { 0%,100% { transform: rotate(-4deg) } 50% { transform: rotate(4deg) } }
      @keyframes fill { 0% { width:0 } 100% { width:var(--w) } }
      .ring { animation: ring 3s ease-out infinite; }
      .card { animation: rise .8s ease-out both; }
      .leaf { animation: sway 4s ease-in-out infinite; transform-origin: 640px 250px; }
      .bar { animation: fill 1.6s ease-out both; }
      @media (prefers-reduced-motion: reduce){ .ring,.card,.leaf,.bar{ animation:none } }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="640" rx="26" fill="rgba(4,20,13,.6)" stroke="rgba(16,185,129,.28)"/>
  <text x="80" y="116" font-size="40" font-weight="800" fill="#d1fae5" font-family="Inter,Arial,sans-serif">Botanica Lab</text>
  <text x="82" y="150" font-size="19" fill="#6ee7b7" font-family="Inter,Arial,sans-serif" letter-spacing="2">EVIDENCE-FIRST R&amp;D</text>
  <!-- pulse + leaf emblem -->
  <g transform="translate(640 250)">
    <circle class="ring" cx="0" cy="0" r="10" fill="none" stroke="#34d399" stroke-width="3"/>
    <circle class="ring" cx="0" cy="0" r="10" fill="none" stroke="#34d399" stroke-width="3" style="animation-delay:1.5s"/>
  </g>
  <g class="leaf">
    <path d="M640 200 C 600 230, 600 290, 640 320 C 680 290, 680 230, 640 200 Z" fill="rgba(52,211,153,.7)"/>
    <line x1="640" y1="210" x2="640" y2="312" stroke="#064e3b" stroke-width="3"/>
  </g>
  <!-- formula cards -->
  <g font-family="Inter,Arial,sans-serif">
    <g class="card" style="animation-delay:.2s">
      <rect x="80" y="400" width="350" height="230" rx="14" fill="rgba(255,255,255,.05)" stroke="rgba(16,185,129,.25)"/>
      <text x="104" y="442" font-size="22" font-weight="700" fill="#ecfdf5">Adaptogen blend</text>
      <text x="104" y="470" font-size="15" fill="#6ee7b7">Source strength</text>
      <rect x="104" y="482" width="300" height="12" rx="6" fill="rgba(255,255,255,.08)"/>
      <rect class="bar" x="104" y="482" height="12" rx="6" fill="#34d399" style="--w:230px;animation-delay:.6s"/>
      <text x="104" y="540" font-size="15" fill="#6ee7b7">Safety review</text>
      <rect x="104" y="552" width="300" height="12" rx="6" fill="rgba(255,255,255,.08)"/>
      <rect class="bar" x="104" y="552" height="12" rx="6" fill="#a7f3d0" style="--w:180px;animation-delay:.9s"/>
      <rect x="104" y="588" width="150" height="28" rx="14" fill="rgba(16,185,129,.18)"/><text x="120" y="608" font-size="14" fill="#6ee7b7">cited · reviewed</text>
    </g>
    <g class="card" style="animation-delay:.6s">
      <rect x="460" y="400" width="350" height="230" rx="14" fill="rgba(255,255,255,.05)" stroke="rgba(16,185,129,.25)"/>
      <text x="484" y="442" font-size="22" font-weight="700" fill="#ecfdf5">Botanical extract</text>
      <text x="484" y="470" font-size="15" fill="#6ee7b7">Source strength</text>
      <rect x="484" y="482" width="300" height="12" rx="6" fill="rgba(255,255,255,.08)"/>
      <rect class="bar" x="484" y="482" height="12" rx="6" fill="#34d399" style="--w:270px;animation-delay:1s"/>
      <text x="484" y="540" font-size="15" fill="#6ee7b7">Safety review</text>
      <rect x="484" y="552" width="300" height="12" rx="6" fill="rgba(255,255,255,.08)"/>
      <rect class="bar" x="484" y="552" height="12" rx="6" fill="#a7f3d0" style="--w:240px;animation-delay:1.3s"/>
      <rect x="484" y="588" width="150" height="28" rx="14" fill="rgba(16,185,129,.18)"/><text x="500" y="608" font-size="14" fill="#6ee7b7">cited · reviewed</text>
    </g>
    <g class="card" style="animation-delay:1s">
      <rect x="840" y="400" width="360" height="230" rx="14" fill="rgba(16,185,129,.08)" stroke="rgba(16,185,129,.3)"/>
      <text x="864" y="442" font-size="16" fill="#6ee7b7" letter-spacing="2">RESEARCH PULSE</text>
      <text x="864" y="486" font-size="22" fill="#ecfdf5">New ingredient signals</text>
      <text x="864" y="520" font-size="22" fill="#ecfdf5">scored by evidence</text>
      <text x="864" y="566" font-size="15" fill="#6ee7b7">No medical claims — R&amp;D only</text>
    </g>
  </g>
</svg>
