<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1e1033"/><stop offset="1" stop-color="#0a0612"/></linearGradient>
    <style>
      @keyframes play { 0% { transform: translateX(0) } 100% { transform: translateX(1020px) } }
      @keyframes beat { 0%,100% { transform: scaleY(.5); opacity:.5 } 50% { transform: scaleY(1); opacity:1 } }
      @keyframes slidein { 0% { opacity:0; transform: translateX(-26px) } 100% { opacity:1; transform: translateX(0) } }
      @keyframes pulseGlow { 0%,100% { opacity:.4 } 50% { opacity:.9 } }
      .playhead { animation: play 5s linear infinite; }
      .clip { animation: slidein .7s ease-out both; }
      .beatbar { transform-origin: center bottom; }
      .glow { animation: pulseGlow 2.4s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce){ .playhead,.clip,.glow,.beatbar > *{ animation:none } }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="640" rx="26" fill="rgba(10,6,18,.6)" stroke="rgba(168,85,247,.28)"/>
  <text x="80" y="116" font-size="40" font-weight="800" fill="#f5f3ff" font-family="Inter,Arial,sans-serif">ScenePilot Studio</text>
  <text x="82" y="150" font-size="19" fill="#c4b5fd" font-family="Inter,Arial,sans-serif" letter-spacing="2">BEAT-AWARE EDIT PLAN</text>
  <!-- preview -->
  <rect x="80" y="190" width="1120" height="230" rx="12" fill="rgba(0,0,0,.35)" stroke="rgba(168,85,247,.2)"/>
  <rect class="glow" x="80" y="190" width="1120" height="230" rx="12" fill="url(#bg)" opacity=".3"/>
  <circle cx="640" cy="305" r="40" fill="rgba(255,255,255,.12)" stroke="#e9d5ff" stroke-width="3"/>
  <polygon points="628,285 628,325 660,305" fill="#f5f3ff"/>
  <text x="640" y="380" font-size="18" fill="#c4b5fd" text-anchor="middle" font-family="Inter,Arial,sans-serif">9:16 · HOOK → PROOF → CTA</text>
  <!-- beat ruler -->
  <g class="beatbar" fill="#a855f7">
    <rect class="" x="120" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite;transform-origin:123px 484px"/>
    <rect x="240" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite .12s;transform-origin:243px 484px"/>
    <rect x="360" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite .24s;transform-origin:363px 484px"/>
    <rect x="480" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite .36s;transform-origin:483px 484px"/>
    <rect x="600" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite .48s;transform-origin:603px 484px"/>
    <rect x="720" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite .6s;transform-origin:723px 484px"/>
    <rect x="840" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite .72s;transform-origin:843px 484px"/>
    <rect x="960" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite .84s;transform-origin:963px 484px"/>
    <rect x="1080" y="450" width="6" height="34" style="animation:beat 1s ease-in-out infinite .96s;transform-origin:1083px 484px"/>
  </g>
  <!-- timeline tracks -->
  <g font-family="Inter,Arial,sans-serif">
    <rect x="80" y="500" width="1120" height="46" rx="8" fill="rgba(255,255,255,.04)"/>
    <rect class="clip" x="120" y="506" width="220" height="34" rx="6" fill="#a855f7" style="animation-delay:.1s"/>
    <rect class="clip" x="360" y="506" width="300" height="34" rx="6" fill="#c084fc" style="animation-delay:.4s"/>
    <rect class="clip" x="680" y="506" width="180" height="34" rx="6" fill="#a855f7" style="animation-delay:.7s"/>
    <rect class="clip" x="880" y="506" width="280" height="34" rx="6" fill="#d8b4fe" style="animation-delay:1s"/>
    <rect x="80" y="556" width="1120" height="46" rx="8" fill="rgba(255,255,255,.04)"/>
    <rect class="clip" x="120" y="562" width="500" height="34" rx="6" fill="#7c3aed" style="animation-delay:.3s"/>
    <rect class="clip" x="660" y="562" width="500" height="34" rx="6" fill="#6d28d9" style="animation-delay:.6s"/>
    <rect x="80" y="612" width="1120" height="34" rx="8" fill="rgba(236,72,153,.12)"/>
    <text x="92" y="635" font-size="15" fill="#f9a8d4">CAPTIONS · animated emphasis</text>
  </g>
  <!-- playhead -->
  <g class="playhead"><rect x="118" y="500" width="3" height="146" fill="#f0abfc"/><polygon points="111,500 128,500 119,512" fill="#f0abfc"/></g>
</svg>
