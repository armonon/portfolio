<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#04210f"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%"><stop offset="0" stop-color="#84cc16" stop-opacity=".5"/><stop offset="1" stop-color="#84cc16" stop-opacity="0"/></radialGradient>
    <clipPath id="scope"><rect x="80" y="250" width="760" height="220" rx="10"/></clipPath>
    <style>
      @keyframes scopeScroll { from { transform: translateX(0); } to { transform: translateX(-640px); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes glowPulse { 0%,100% { opacity:.35 } 50% { opacity:.85 } }
      @keyframes scan { from { transform: translateY(-40px) } to { transform: translateY(720px) } }
      @keyframes grain { 0% { opacity:0; transform: translateY(0) } 30% { opacity:.95 } 100% { opacity:0; transform: translateY(-46px) } }
      @keyframes meter { 0%,100% { height:18px; y:0 } 50% { height:74px } }
      .scopeline { animation: scopeScroll 3.4s linear infinite; }
      .knob { animation: spin 6s linear infinite; transform-origin: center; }
      .knob2 { animation: spin 9s linear infinite reverse; transform-origin: center; }
      .glow { animation: glowPulse 2.6s ease-in-out infinite; }
      .scan { animation: scan 5s linear infinite; }
      .g { animation: grain 2.4s ease-out infinite; }
      @media (prefers-reduced-motion: reduce){ .scopeline,.knob,.knob2,.glow,.scan,.g{ animation:none } }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)" class="glow"/>
  <rect x="40" y="40" width="1200" height="640" rx="26" fill="rgba(2,6,23,.55)" stroke="rgba(132,204,22,.28)"/>
  <!-- header -->
  <text x="80" y="120" font-size="44" font-weight="800" fill="#ecfccb" font-family="Inter,Arial,sans-serif" letter-spacing="3">ENTROPY</text>
  <text x="82" y="160" font-size="20" fill="#a3e635" font-family="Inter,Arial,sans-serif" letter-spacing="4">GRANULAR CHAOS ENGINE</text>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="980" y="86" width="100" height="40" rx="20" fill="rgba(132,204,22,.14)" stroke="rgba(132,204,22,.4)"/><text x="1000" y="112" font-size="18" fill="#ecfccb">VST3</text>
    <rect x="1092" y="86" width="86" height="40" rx="20" fill="rgba(132,204,22,.14)" stroke="rgba(132,204,22,.4)"/><text x="1112" y="112" font-size="18" fill="#ecfccb">AU</text>
  </g>
  <!-- oscilloscope -->
  <rect x="80" y="250" width="760" height="220" rx="10" fill="rgba(0,0,0,.35)" stroke="rgba(132,204,22,.25)"/>
  <g clip-path="url(#scope)">
    <g class="scopeline">
      <path d="M0 360 C 40 280,80 440,120 360 S 200 280,240 360 S 320 450,360 360 S 440 270,480 360 S 560 450,600 360 S 680 280,640 360 L 640 360 C 680 280,720 440,760 360 S 840 280,880 360 S 960 450,1000 360 S 1080 270,1120 360 S 1200 450,1240 360 S 1320 280,1280 360"
        fill="none" stroke="#a3e635" stroke-width="4" stroke-opacity=".9"/>
    </g>
  </g>
  <!-- grain cloud -->
  <g fill="#bef264">
    <circle class="g" cx="200" cy="430" r="5" style="animation-delay:0s"/>
    <circle class="g" cx="300" cy="430" r="4" style="animation-delay:.4s"/>
    <circle class="g" cx="400" cy="430" r="6" style="animation-delay:.9s"/>
    <circle class="g" cx="520" cy="430" r="4" style="animation-delay:.2s"/>
    <circle class="g" cx="620" cy="430" r="5" style="animation-delay:1.2s"/>
    <circle class="g" cx="720" cy="430" r="4" style="animation-delay:.7s"/>
    <circle class="g" cx="260" cy="430" r="3" style="animation-delay:1.6s"/>
    <circle class="g" cx="470" cy="430" r="5" style="animation-delay:1.9s"/>
  </g>
  <!-- knobs -->
  <g transform="translate(960 300)">
    <circle r="58" fill="rgba(20,40,16,.9)" stroke="rgba(132,204,22,.5)" stroke-width="3"/>
    <g class="knob"><line x1="0" y1="0" x2="0" y2="-44" stroke="#bef264" stroke-width="5" stroke-linecap="round"/></g>
    <text x="0" y="92" font-size="16" fill="#a3e635" text-anchor="middle" font-family="Inter,Arial,sans-serif">GRAINS</text>
  </g>
  <g transform="translate(1110 300)">
    <circle r="58" fill="rgba(20,40,16,.9)" stroke="rgba(132,204,22,.5)" stroke-width="3"/>
    <g class="knob2"><line x1="0" y1="0" x2="0" y2="-44" stroke="#bef264" stroke-width="5" stroke-linecap="round"/></g>
    <text x="0" y="92" font-size="16" fill="#a3e635" text-anchor="middle" font-family="Inter,Arial,sans-serif">FREEZE</text>
  </g>
  <!-- spectrum meters -->
  <g transform="translate(80 520)">
    <g fill="#84cc16">
      <rect class="g" x="0" width="22" height="60" rx="3" style="animation:meter 1.1s ease-in-out infinite"/>
      <rect x="34" width="22" height="60" rx="3" fill="#a3e635"><animate attributeName="height" values="20;70;30;60;20" dur="1.3s" repeatCount="indefinite"/></rect>
      <rect x="68" width="22" height="60" rx="3" fill="#bef264"><animate attributeName="height" values="50;15;65;25;50" dur="1.0s" repeatCount="indefinite"/></rect>
      <rect x="102" width="22" height="60" rx="3" fill="#a3e635"><animate attributeName="height" values="30;72;20;55;30" dur="1.5s" repeatCount="indefinite"/></rect>
      <rect x="136" width="22" height="60" rx="3" fill="#84cc16"><animate attributeName="height" values="60;25;70;35;60" dur="1.2s" repeatCount="indefinite"/></rect>
      <rect x="170" width="22" height="60" rx="3" fill="#bef264"><animate attributeName="height" values="25;65;30;72;25" dur="1.4s" repeatCount="indefinite"/></rect>
    </g>
    <text x="0" y="100" font-size="16" fill="#65a30d" font-family="Inter,Arial,sans-serif">SPECTRAL FREEZE · FFT</text>
  </g>
  <!-- CRT scanline -->
  <rect class="scan" x="40" y="0" width="1200" height="3" fill="rgba(190,242,100,.25)"/>
</svg>
