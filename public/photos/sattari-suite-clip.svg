<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2a1605"/><stop offset="1" stop-color="#0a0a07"/></linearGradient>
    <style>
      @keyframes draw { 0% { stroke-dashoffset: 1700 } 60% { stroke-dashoffset: 0 } 100% { stroke-dashoffset: 0 } }
      @keyframes sweep { 0% { transform: translateX(0) } 100% { transform: translateX(1000px) } }
      @keyframes snap { 0%,15% { transform: translateY(var(--from)); opacity:.5 } 35%,100% { transform: translateY(0); opacity:1 } }
      @keyframes litlane { 0%,100% { opacity:.06 } 50% { opacity:.18 } }
      @keyframes spin { to { transform: rotate(360deg) } }
      @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:.3 } }
      .corrected { stroke-dasharray: 1700; animation: draw 4s ease-in-out infinite; }
      .play { animation: sweep 4s linear infinite; }
      .snap { animation: snap 3s ease-in-out infinite; }
      .lit { animation: litlane 3s ease-in-out infinite; }
      .knob { animation: spin 7s linear infinite; transform-origin: center; }
      .blink { animation: blink 1.4s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce){ .corrected,.play,.snap,.lit,.knob,.blink{ animation:none; stroke-dashoffset:0 } .snap{ transform:translateY(0) } }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="640" rx="26" fill="rgba(10,10,7,.6)" stroke="rgba(245,158,11,.28)"/>
  <!-- header -->
  <circle cx="96" cy="98" r="24" fill="none" stroke="#f59e0b" stroke-width="5"/><circle cx="96" cy="98" r="8" fill="#fbbf24"/>
  <text x="138" y="92" font-size="36" font-weight="800" fill="#fde68a" font-family="Inter,Arial,sans-serif">Sattari Suite</text>
  <text x="140" y="122" font-size="18" fill="#fbbf24" font-family="Inter,Arial,sans-serif" letter-spacing="3">AUTO PITCH · VOCAL TUNING</text>
  <g class="blink" font-family="Inter,Arial,sans-serif"><rect x="1006" y="76" width="174" height="42" rx="21" fill="rgba(132,204,22,.16)" stroke="rgba(132,204,22,.45)"/><circle cx="1034" cy="97" r="6" fill="#a3e635"/><text x="1052" y="103" font-size="16" fill="#d9f99d">correcting…</text></g>

  <!-- tuning editor -->
  <rect x="172" y="200" width="1028" height="360" rx="12" fill="rgba(0,0,0,.32)" stroke="rgba(245,158,11,.18)"/>
  <!-- note lanes + labels -->
  <g font-family="Inter,Arial,sans-serif" font-size="15" fill="#a16207">
    <g stroke="#f59e0b"><line x1="172" y1="240" x2="1200" y2="240" stroke-opacity=".18"/><line x1="172" y1="296" x2="1200" y2="296" stroke-opacity=".18"/><line x1="172" y1="352" x2="1200" y2="352" stroke-opacity=".18"/><line x1="172" y1="408" x2="1200" y2="408" stroke-opacity=".18"/><line x1="172" y1="464" x2="1200" y2="464" stroke-opacity=".18"/><line x1="172" y1="520" x2="1200" y2="520" stroke-opacity=".18"/></g>
    <text x="120" y="245">A</text><text x="120" y="301">G</text><text x="120" y="357">F</text><text x="120" y="413">E</text><text x="120" y="469">D</text><text x="120" y="525">C</text>
  </g>
  <!-- lit target note blocks (where corrected pitch lands) -->
  <g fill="#f59e0b">
    <rect class="lit" x="210" y="452" width="150" height="24" rx="6"/>
    <rect class="lit" x="380" y="396" width="150" height="24" rx="6" style="animation-delay:.5s"/>
    <rect class="lit" x="550" y="340" width="150" height="24" rx="6" style="animation-delay:1s"/>
    <rect class="lit" x="720" y="396" width="150" height="24" rx="6" style="animation-delay:1.5s"/>
    <rect class="lit" x="890" y="284" width="150" height="24" rx="6" style="animation-delay:2s"/>
    <rect class="lit" x="1040" y="340" width="130" height="24" rx="6" style="animation-delay:2.5s"/>
  </g>
  <!-- raw (off-pitch) vocal line -->
  <path d="M210 470 C 270 430, 320 500, 380 410 C 440 360, 500 430, 560 350 C 620 300, 690 430, 760 405 C 820 385, 870 320, 940 295 C 1010 275, 1090 360, 1160 350"
    fill="none" stroke="#6b7280" stroke-width="3" stroke-opacity=".7" stroke-dasharray="2 6"/>
  <!-- corrected (snapped) pitch line -->
  <path class="corrected" d="M210 464 H360 V408 H530 V352 H700 V408 H870 V296 H1040 V352 H1170"
    fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- snapping dots: jump from raw to corrected lane -->
  <g fill="#fde68a">
    <circle class="snap" cx="285" cy="464" r="8" style="--from:14px"/>
    <circle class="snap" cx="445" cy="408" r="8" style="--from:-34px;animation-delay:.4s"/>
    <circle class="snap" cx="615" cy="352" r="8" style="--from:18px;animation-delay:.8s"/>
    <circle class="snap" cx="785" cy="408" r="8" style="--from:-22px;animation-delay:1.2s"/>
    <circle class="snap" cx="955" cy="296" r="8" style="--from:24px;animation-delay:1.6s"/>
  </g>
  <!-- playhead -->
  <g class="play"><rect x="208" y="200" width="3" height="360" fill="#fef3c7" opacity=".8"/></g>

  <!-- control chips + retune knob -->
  <g font-family="Inter,Arial,sans-serif">
    <rect x="172" y="588" width="150" height="48" rx="24" fill="rgba(245,158,11,.12)" stroke="rgba(245,158,11,.35)"/><text x="196" y="618" font-size="18" fill="#fde68a">Key · A min</text>
    <rect x="338" y="588" width="170" height="48" rx="24" fill="rgba(245,158,11,.12)" stroke="rgba(245,158,11,.35)"/><text x="362" y="618" font-size="18" fill="#fde68a">Scale · minor</text>
    <rect x="524" y="588" width="170" height="48" rx="24" fill="rgba(245,158,11,.12)" stroke="rgba(245,158,11,.35)"/><text x="548" y="618" font-size="18" fill="#fde68a">Mode · natural</text>
    <g transform="translate(1130 612)"><circle r="40" fill="rgba(40,24,6,.9)" stroke="rgba(245,158,11,.5)" stroke-width="3"/><g class="knob"><line x1="0" y1="0" x2="0" y2="-30" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/></g></g>
    <text x="1130" y="600" font-size="15" fill="#a16207" text-anchor="middle">RETUNE</text>
  </g>
</svg>
