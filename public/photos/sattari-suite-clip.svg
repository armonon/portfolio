<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2a1605"/><stop offset="1" stop-color="#0a0a07"/></linearGradient>
    <style>
      @keyframes fill { 0% { width:0 } 70% { width:var(--w) } 100% { width:var(--w) } }
      @keyframes rise { 0% { opacity:0; transform: translateY(18px) } 100% { opacity:1; transform: translateY(0) } }
      @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
      @keyframes spin { to { transform: rotate(360deg) } }
      .bar { animation: fill 2.6s ease-in-out infinite; }
      .tile { animation: rise .8s ease-out both; }
      .pulse { animation: pulse 1.6s ease-in-out infinite; }
      .spin { animation: spin 1.4s linear infinite; transform-origin: center; }
      @media (prefers-reduced-motion: reduce){ .bar,.tile,.pulse,.spin{ animation:none } .bar{ width:var(--w) } }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="640" rx="26" fill="rgba(10,10,7,.6)" stroke="rgba(245,158,11,.28)"/>
  <!-- header -->
  <circle cx="96" cy="100" r="26" fill="none" stroke="#f59e0b" stroke-width="5"/><circle cx="96" cy="100" r="9" fill="#fbbf24"/>
  <text x="140" y="96" font-size="38" font-weight="800" fill="#fde68a" font-family="Inter,Arial,sans-serif">Sattari Hub</text>
  <text x="142" y="128" font-size="18" fill="#fbbf24" font-family="Inter,Arial,sans-serif" letter-spacing="3">INSTALLER · UPDATER · v0.1.2</text>
  <g class="pulse" font-family="Inter,Arial,sans-serif"><rect x="980" y="78" width="200" height="44" rx="22" fill="rgba(132,204,22,.16)" stroke="rgba(132,204,22,.45)"/><circle cx="1008" cy="100" r="6" fill="#a3e635"/><text x="1026" y="107" font-size="17" fill="#d9f99d">update feed live</text></g>
  <!-- plugin tiles -->
  <g font-family="Inter,Arial,sans-serif">
    <!-- Entropy -->
    <g class="tile" style="animation-delay:.1s">
      <rect x="80" y="190" width="1120" height="120" rx="16" fill="rgba(255,255,255,.05)" stroke="rgba(245,158,11,.2)"/>
      <rect x="104" y="214" width="72" height="72" rx="14" fill="rgba(132,204,22,.2)" stroke="rgba(132,204,22,.5)"/><circle cx="140" cy="250" r="20" fill="none" stroke="#a3e635" stroke-width="4"/><circle cx="140" cy="250" r="5" fill="#bef264"/>
      <text x="200" y="240" font-size="26" font-weight="700" fill="#fff">Entropy</text>
      <text x="200" y="268" font-size="16" fill="#a8a29e">Granular chaos engine · VST3 / AU</text>
      <rect x="640" y="246" width="420" height="10" rx="5" fill="rgba(255,255,255,.1)"/>
      <rect class="bar" x="640" y="246" height="10" rx="5" fill="#84cc16" style="--w:420px;animation-delay:.2s"/>
      <text x="1086" y="256" font-size="16" fill="#a3e635">installed</text>
    </g>
    <!-- Auto Pitch -->
    <g class="tile" style="animation-delay:.4s">
      <rect x="80" y="326" width="1120" height="120" rx="16" fill="rgba(255,255,255,.05)" stroke="rgba(245,158,11,.2)"/>
      <rect x="104" y="350" width="72" height="72" rx="14" fill="rgba(245,158,11,.18)" stroke="rgba(245,158,11,.5)"/><path d="M118 400 C 132 370,148 430,162 386" stroke="#fbbf24" stroke-width="4" fill="none"/>
      <text x="200" y="376" font-size="26" font-weight="700" fill="#fff">Auto Pitch</text>
      <text x="200" y="404" font-size="16" fill="#a8a29e">Vocal tuning · adaptive sections</text>
      <rect x="640" y="382" width="420" height="10" rx="5" fill="rgba(255,255,255,.1)"/>
      <rect class="bar" x="640" y="382" height="10" rx="5" fill="#f59e0b" style="--w:300px;animation-delay:.6s"/>
      <g class="spin" style="transform-origin:1086px 387px"><circle cx="1086" cy="387" r="10" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="40 12"/></g>
      <text x="1106" y="392" font-size="16" fill="#fbbf24">updating…</text>
    </g>
    <!-- StemDeck -->
    <g class="tile" style="animation-delay:.7s">
      <rect x="80" y="462" width="1120" height="120" rx="16" fill="rgba(255,255,255,.05)" stroke="rgba(245,158,11,.2)"/>
      <rect x="104" y="486" width="72" height="72" rx="14" fill="rgba(248,113,113,.18)" stroke="rgba(248,113,113,.5)"/>
      <g stroke="#fca5a5" stroke-width="4"><line x1="124" y1="500" x2="124" y2="544"/><line x1="140" y1="500" x2="140" y2="544"/><line x1="156" y1="500" x2="156" y2="544"/></g>
      <text x="200" y="512" font-size="26" font-weight="700" fill="#fff">StemDeck</text>
      <text x="200" y="540" font-size="16" fill="#a8a29e">Four-deck stem DJ app · macOS</text>
      <rect x="640" y="518" width="420" height="10" rx="5" fill="rgba(255,255,255,.1)"/>
      <rect class="bar" x="640" y="518" height="10" rx="5" fill="#f87171" style="--w:420px;animation-delay:1s"/>
      <text x="1086" y="528" font-size="16" fill="#fca5a5">installed</text>
    </g>
  </g>
  <text x="80" y="630" font-size="17" fill="#92400e" font-family="Inter,Arial,sans-serif" letter-spacing="2">AU · VST3 · STANDALONE — ONE DOWNLOAD, ALWAYS UP TO DATE</text>
</svg>
