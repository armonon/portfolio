<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2a1505"/><stop offset="1" stop-color="#0b0a09"/></linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f59e0b" stop-opacity=".45"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></linearGradient>
    <style>
      @keyframes draw { from { stroke-dashoffset: 1600 } to { stroke-dashoffset: 0 } }
      @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:.2 } }
      @keyframes rise { 0% { opacity:0; transform: translateY(14px) } 100% { opacity:1; transform: translateY(0) } }
      @keyframes sweepDot { 0% { transform: translateX(0) } 100% { transform: translateX(700px) } }
      .line { stroke-dasharray: 1600; animation: draw 4s ease-in-out infinite; }
      .blink { animation: blink 1.4s ease-in-out infinite; }
      .row { animation: rise .8s ease-out both; }
      .dot { animation: sweepDot 4s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce){ .line,.blink,.row,.dot{ animation:none; stroke-dashoffset:0 } }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="640" rx="26" fill="rgba(11,10,9,.6)" stroke="rgba(245,158,11,.25)"/>
  <text x="80" y="116" font-size="40" font-weight="800" fill="#fef3c7" font-family="Inter,Arial,sans-serif">Trader Oracle</text>
  <g class="blink"><circle cx="1090" cy="100" r="7" fill="#34d399"/></g>
  <text x="1108" y="107" font-size="20" fill="#a7f3d0" font-family="Inter,Arial,sans-serif">LIVE</text>
  <text x="82" y="150" font-size="19" fill="#fbbf24" font-family="Inter,Arial,sans-serif" letter-spacing="2">WATCHLIST · MARKET PULSE</text>
  <!-- chart panel -->
  <rect x="80" y="200" width="740" height="430" rx="14" fill="rgba(0,0,0,.32)" stroke="rgba(245,158,11,.2)"/>
  <g stroke="rgba(245,158,11,.12)" stroke-width="1">
    <line x1="80" y1="300" x2="820" y2="300"/><line x1="80" y1="400" x2="820" y2="400"/><line x1="80" y1="500" x2="820" y2="500"/>
  </g>
  <path d="M100 520 L 220 460 L 320 500 L 430 380 L 540 430 L 660 300 L 780 350 L 800 350 L 800 610 L 100 610 Z" fill="url(#area)"/>
  <path class="line" d="M100 520 L 220 460 L 320 500 L 430 380 L 540 430 L 660 300 L 780 350" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g class="dot"><circle cx="100" cy="520" r="8" fill="#fde68a"/></g>
  <text x="100" y="250" font-size="34" font-weight="800" fill="#fef3c7" font-family="Inter,Arial,sans-serif">+4.2%</text>
  <!-- watchlist -->
  <g font-family="Inter,Arial,sans-serif">
    <g class="row" style="animation-delay:.1s"><rect x="860" y="210" width="340" height="86" rx="12" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)"/><text x="884" y="248" font-size="24" font-weight="700" fill="#fff">NVDA</text><text x="884" y="278" font-size="16" fill="#a8a29e">momentum · high</text><text x="1176" y="262" font-size="24" font-weight="800" fill="#34d399" text-anchor="end">▲ 3.1%</text></g>
    <g class="row" style="animation-delay:.5s"><rect x="860" y="306" width="340" height="86" rx="12" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)"/><text x="884" y="344" font-size="24" font-weight="700" fill="#fff">TSLA</text><text x="884" y="374" font-size="16" fill="#a8a29e">catalyst · earnings</text><text x="1176" y="358" font-size="24" font-weight="800" fill="#f87171" text-anchor="end">▼ 1.4%</text></g>
    <g class="row" style="animation-delay:.9s"><rect x="860" y="402" width="340" height="86" rx="12" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)"/><text x="884" y="440" font-size="24" font-weight="700" fill="#fff">AAPL</text><text x="884" y="470" font-size="16" fill="#a8a29e">range · watch</text><text x="1176" y="454" font-size="24" font-weight="800" fill="#34d399" text-anchor="end">▲ 0.8%</text></g>
    <g class="row" style="animation-delay:1.3s"><rect x="860" y="498" width="340" height="132" rx="12" fill="rgba(245,158,11,.08)" stroke="rgba(245,158,11,.25)"/><text x="884" y="534" font-size="16" fill="#fbbf24" letter-spacing="2">SCENARIO</text><text x="884" y="566" font-size="19" fill="#fef3c7">Risk-defined setup · stop below</text><text x="884" y="594" font-size="19" fill="#fef3c7">invalidation. Research only.</text></g>
  </g>
</svg>
