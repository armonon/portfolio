<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#052e16"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <radialGradient id="glow" cx="72%" cy="22%" r="70%"><stop offset="0" stop-color="#84cc16" stop-opacity=".45"/><stop offset="1" stop-color="#84cc16" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
    <radialGradient id="haz" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#bef264" stop-opacity=".9"/><stop offset="1" stop-color="#65a30d" stop-opacity=".6"/></radialGradient>
  </defs>
  <rect width="1280" height="900" fill="#020617"/>
  <rect width="1280" height="900" fill="url(#bg)" opacity=".92"/>
  <rect width="1280" height="900" fill="url(#glow)"/>
  <circle cx="1110" cy="140" r="240" fill="#84cc16" opacity=".14" filter="url(#blur)"/>
  <circle cx="90" cy="820" r="280" fill="#000000" opacity=".22" filter="url(#blur)"/>
  <rect x="54" y="54" width="1172" height="792" rx="54" fill="rgba(2,6,23,.5)" stroke="rgba(132,204,22,.28)"/>
