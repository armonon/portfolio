      <circle r="30" fill="#020617"/><circle r="18" fill="url(#haz)"/>
    </g>
  </g>
  <!-- grain cloud / oscilloscope -->
  <g transform="translate(92 380)" stroke="#a3e635" stroke-opacity=".85" fill="none" stroke-linecap="round">
    <path d="M0 90 C 50 10, 100 170, 150 90 S 250 10, 300 90 S 400 170, 450 90 S 550 10, 600 90 S 700 150, 760 90" stroke-width="6"/>
    <path d="M0 150 C 70 120, 120 180, 200 150 S 360 110, 440 150 S 600 190, 760 150" stroke-width="3" opacity=".5"/>
    <line x1="20" y1="250" x2="740" y2="250" stroke-width="2" opacity=".3"/>
  </g>
  <!-- grain dots -->
  <g fill="#bef264">
    <circle cx="180" cy="500" r="6" opacity=".9"/><circle cx="260" cy="540" r="4" opacity=".7"/><circle cx="330" cy="490" r="7" opacity=".85"/>
    <circle cx="410" cy="560" r="5" opacity=".6"/><circle cx="500" cy="510" r="6" opacity=".8"/><circle cx="600" cy="545" r="4" opacity=".7"/>
    <circle cx="690" cy="500" r="6" opacity=".85"/><circle cx="760" cy="555" r="5" opacity=".6"/>
  </g>
  <rect x="92" y="700" width="168" height="48" rx="24" fill="rgba(132,204,22,.12)" stroke="rgba(132,204,22,.3)"/>
  <text x="116" y="731" font-size="20" fill="#ecfccb" font-family="Inter, Arial, sans-serif">Freeze</text>
  <rect x="278" y="700" width="210" height="48" rx="24" fill="rgba(132,204,22,.12)" stroke="rgba(132,204,22,.3)"/>
  <text x="302" y="731" font-size="20" fill="#ecfccb" font-family="Inter, Arial, sans-serif">Spectral FFT</text>
  <rect x="506" y="700" width="160" height="48" rx="24" fill="rgba(132,204,22,.12)" stroke="rgba(132,204,22,.3)"/>
  <text x="530" y="731" font-size="20" fill="#ecfccb" font-family="Inter, Arial, sans-serif">Grains</text>
  <rect x="684" y="700" width="150" height="48" rx="24" fill="rgba(132,204,22,.12)" stroke="rgba(132,204,22,.3)"/>
  <text x="708" y="731" font-size="20" fill="#ecfccb" font-family="Inter, Arial, sans-serif">Scrub</text>
