<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0ea5e9"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="65%"><stop offset="0" stop-color="white" stop-opacity=".35"/><stop offset="1" stop-color="white" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="38"/></filter>
  </defs>
  <rect width="1280" height="900" fill="#09090b"/>
  <rect width="1280" height="900" fill="url(#bg)" opacity=".8"/>
  <rect width="1280" height="900" fill="url(#glow)"/>
  <circle cx="1120" cy="120" r="230" fill="white" opacity=".12" filter="url(#blur)"/>
  <circle cx="80" cy="830" r="270" fill="black" opacity=".18" filter="url(#blur)"/>
  <rect x="54" y="54" width="1172" height="792" rx="54" fill="rgba(9,9,11,.42)" stroke="rgba(255,255,255,.16)"/>
  <text x="92" y="145" font-size="28" fill="#e0e7ff" font-family="Inter, Arial, sans-serif" letter-spacing="6">PRODUCT MOCKUP STUDIO</text>
  <text x="92" y="228" font-size="82" fill="white" font-weight="800" font-family="Inter, Arial, sans-serif">MODEL STUDIO</text>
  <text x="96" y="286" font-size="30" fill="#eef2ff" font-family="Inter, Arial, sans-serif">Artwork in → polished product photos &amp; video out</text>
  <!-- garment plate -->
  <g transform="translate(120 360)">
    <path d="M120 20 L200 0 L240 40 L300 70 L270 130 L230 110 L230 360 L10 360 L10 110 L-30 130 L-60 70 L0 40 L40 0 Z"
          fill="rgba(255,255,255,.14)" stroke="rgba(255,255,255,.5)" stroke-width="3"/>
    <!-- print artwork composited on chest -->
    <rect x="70" y="120" width="100" height="100" rx="10" fill="rgba(99,102,241,.55)" stroke="white" stroke-opacity=".7" stroke-width="2"/>
    <circle cx="120" cy="170" r="30" fill="none" stroke="white" stroke-width="6" stroke-opacity=".9"/>
    <path d="M105 170 L135 170 M120 155 L120 185" stroke="white" stroke-width="6" stroke-opacity=".9"/>
  </g>
  <!-- arrow / export panel -->
  <g transform="translate(560 430)">
    <line x1="0" y1="60" x2="120" y2="60" stroke="white" stroke-opacity=".8" stroke-width="6"/>
    <path d="M120 60 L100 45 M120 60 L100 75" stroke="white" stroke-opacity=".8" stroke-width="6" fill="none"/>
  </g>
  <g transform="translate(720 360)">
    <rect x="0" y="0" width="170" height="160" rx="14" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
    <rect x="20" y="22" width="130" height="86" rx="8" fill="rgba(255,255,255,.18)"/>
    <circle cx="50" cy="50" r="12" fill="white" opacity=".75"/>
    <path d="M30 100 L70 65 L100 92 L130 70" stroke="white" stroke-opacity=".7" stroke-width="4" fill="none"/>
    <text x="20" y="138" font-size="20" fill="#eef2ff" font-family="Inter, Arial, sans-serif">product.png</text>
    <rect x="0" y="190" width="170" height="160" rx="14" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
    <polygon points="60,232 60,308 120,270" fill="white" opacity=".8"/>
    <text x="20" y="332" font-size="20" fill="#eef2ff" font-family="Inter, Arial, sans-serif">promo.mp4</text>
  </g>
  <rect x="92" y="760" width="190" height="48" rx="24" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.18)"/>
  <text x="116" y="791" font-size="20" fill="#eef2ff" font-family="Inter, Arial, sans-serif">Background cut</text>
  <rect x="300" y="760" width="170" height="48" rx="24" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.18)"/>
  <text x="324" y="791" font-size="20" fill="#eef2ff" font-family="Inter, Arial, sans-serif">Composite</text>
  <rect x="488" y="760" width="140" height="48" rx="24" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.18)"/>
  <text x="512" y="791" font-size="20" fill="#eef2ff" font-family="Inter, Arial, sans-serif">Export</text>
</svg>
